name: Deploy Bureau API to Namecheap

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'server.js'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/copy-api-assets.mjs'
      - 'scripts/clean-api-build.mjs'
      - '.github/workflows/deploy-namecheap-api.yml'
      - '.github/workflows/stripe-system-test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bureau-namecheap-api
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build:api
      - uses: actions/upload-artifact@v7
        with:
          name: bureau-namecheap-api
          path: |
            server-dist
            server.js
            package.json
            package-lock.json
          retention-days: 14

  deploy:
    if: vars.NAMECHEAP_API_DEPLOY_ENABLED == 'true'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: ${{ secrets.NAMECHEAP_SSH_HOST }}
      SSH_USER: ${{ secrets.NAMECHEAP_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.NAMECHEAP_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.NAMECHEAP_SSH_KNOWN_HOSTS }}
      SSH_PORT: ${{ vars.NAMECHEAP_SSH_PORT }}
      APP_ROOT: ${{ vars.NAMECHEAP_APP_ROOT }}
      NODE_VERSION: ${{ vars.NAMECHEAP_NODE_VERSION }}
      API_HEALTH_URL: ${{ vars.NAMECHEAP_API_HEALTH_URL }}
      BUREAU_LEGAL_REVIEW_COMPLETED: ${{ vars.BUREAU_LEGAL_REVIEW_COMPLETED }}
      BUREAU_TAX_REVIEW_COMPLETED: ${{ vars.BUREAU_TAX_REVIEW_COMPLETED }}
      BUREAU_COMMERCIAL_PAYMENTS_ENABLED: ${{ vars.BUREAU_COMMERCIAL_PAYMENTS_ENABLED }}
      BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED: ${{ vars.BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED }}
      BUREAU_PILOT_TRANSACTION_CAP_CENTS: ${{ vars.BUREAU_PILOT_TRANSACTION_CAP_CENTS }}
      BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS: ${{ vars.BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS }}
      BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS: ${{ vars.BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS }}
      BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS: ${{ vars.BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: bureau-namecheap-api
          path: release
      - name: Validate deployment configuration
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          test -n "$SSH_PORT"
          test -n "$APP_ROOT"
          test -n "$NODE_VERSION"
          test -n "$API_HEALTH_URL"
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z0-9_-]+$ ]]
          [[ "$SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$APP_ROOT" =~ ^[A-Za-z0-9_./-]+$ ]]
          [[ "$NODE_VERSION" =~ ^[0-9]+$ ]]
          [[ "$API_HEALTH_URL" =~ ^https://[A-Za-z0-9.-]+/health/ready$ ]]
          [[ "$BUREAU_LEGAL_REVIEW_COMPLETED" =~ ^(true|false)$ ]]
          [[ "$BUREAU_TAX_REVIEW_COMPLETED" =~ ^(true|false)$ ]]
          [[ "$BUREAU_COMMERCIAL_PAYMENTS_ENABLED" =~ ^(true|false)$ ]]
          [[ "$BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED" =~ ^(true|false)$ ]]
          [[ "$BUREAU_PILOT_TRANSACTION_CAP_CENTS" =~ ^[0-9]+$ ]]
          [[ "$BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS" =~ ^[0-9]+$ ]]
          [[ "$BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS" =~ ^[0-9]+$ ]]
          [[ "$BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS" =~ ^[0-9]+$ ]]
          (( BUREAU_PILOT_TRANSACTION_CAP_CENTS >= 500 && BUREAU_PILOT_TRANSACTION_CAP_CENTS <= 50000 ))
          (( BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS >= 500 && BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS <= 100000 ))
          (( BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS >= 500 && BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS <= 500000 ))
          (( BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS >= 500 && BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS <= 800000 ))
      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Upload application files
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p \"$APP_ROOT\""
          rsync -az --checksum -e "ssh -p $SSH_PORT" release/server-dist release/server.js release/package.json release/package-lock.json "$SSH_USER@$SSH_HOST:$APP_ROOT/"
      - name: Install, migrate, and restart
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_ROOT='$APP_ROOT' NODE_VERSION='$NODE_VERSION' \
            BUREAU_LEGAL_REVIEW_COMPLETED='$BUREAU_LEGAL_REVIEW_COMPLETED' \
            BUREAU_TAX_REVIEW_COMPLETED='$BUREAU_TAX_REVIEW_COMPLETED' \
            BUREAU_COMMERCIAL_PAYMENTS_ENABLED='$BUREAU_COMMERCIAL_PAYMENTS_ENABLED' \
            BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED='$BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED' \
            BUREAU_PILOT_TRANSACTION_CAP_CENTS='$BUREAU_PILOT_TRANSACTION_CAP_CENTS' \
            BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS='$BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS' \
            BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS='$BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS' \
            BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS='$BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS' bash -s" <<'REMOTE'
          # CloudLinux's Node activation script reads optional unset variables.
          set -eo pipefail
          cd "$APP_ROOT"
          test -f .env
          set_env() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }
          set_env LEGAL_REVIEW_COMPLETED "$BUREAU_LEGAL_REVIEW_COMPLETED"
          set_env TAX_REVIEW_COMPLETED "$BUREAU_TAX_REVIEW_COMPLETED"
          set_env COMMERCIAL_PAYMENTS_ENABLED "$BUREAU_COMMERCIAL_PAYMENTS_ENABLED"
          set_env MILESTONE_PAYMENT_PILOT_ENABLED "$BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED"
          set_env PILOT_TRANSACTION_CAP_CENTS "$BUREAU_PILOT_TRANSACTION_CAP_CENTS"
          set_env PILOT_DAILY_CHARGE_CAP_CENTS "$BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS"
          set_env PILOT_LIFETIME_CHARGE_CAP_CENTS "$BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS"
          set_env PILOT_LIFETIME_EXPOSURE_CAP_CENTS "$BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS"
          VENV="$HOME/nodevenv/$APP_ROOT/$NODE_VERSION"
          test -f "$VENV/bin/activate"
          source "$VENV/bin/activate"
          npm ci --omit=dev
          node server-dist/migrate.js
          mkdir -p tmp
          touch tmp/restart.txt
          REMOTE
      - name: Verify public API health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error --max-time 10 \
              --user-agent 'Mozilla/5.0 (compatible; Bureau-Release-Check/1.0)' \
              --header 'Accept: application/json' \
              "$API_HEALTH_URL"; then
              exit 0
            fi
            sleep 3
          done
          exit 1
      - name: Smoke test distribution endpoints
        run: |
          API_ORIGIN="${API_HEALTH_URL%/health/ready}"
          curl --fail --silent --show-error --max-time 10 "$API_ORIGIN/api/public/pricing" >/dev/null
          EXPECTED_ACCEPTING_NEW_PAYMENTS=false
          if [[ "$BUREAU_LEGAL_REVIEW_COMPLETED" == true \
            && "$BUREAU_TAX_REVIEW_COMPLETED" == true \
            && "$BUREAU_COMMERCIAL_PAYMENTS_ENABLED" == true \
            && "$BUREAU_MILESTONE_PAYMENT_PILOT_ENABLED" == true ]]; then
            EXPECTED_ACCEPTING_NEW_PAYMENTS=true
          fi
          curl --fail --silent --show-error --max-time 10 "$API_ORIGIN/api/public/readiness" | jq -e \
            --argjson expected "$EXPECTED_ACCEPTING_NEW_PAYMENTS" \
            --argjson transactionCap "$BUREAU_PILOT_TRANSACTION_CAP_CENTS" \
            --argjson dailyCap "$BUREAU_PILOT_DAILY_CHARGE_CAP_CENTS" \
            --argjson lifetimeChargeCap "$BUREAU_PILOT_LIFETIME_CHARGE_CAP_CENTS" \
            --argjson lifetimeExposureCap "$BUREAU_PILOT_LIFETIME_EXPOSURE_CAP_CENTS" '
            .readiness.acceptingRequests == true and
            .readiness.acceptingNewPayments == $expected and
            .readiness.stage == (if $expected then "milestone_pilot" else "founding_beta" end) and
            .readiness.paymentMode == "live" and
            (if $expected then .readiness.blockers == [] else (.readiness.blockers | length) > 0 end) and
            .readiness.paymentProducts.milestoneFunding == $expected and
            .readiness.paymentProducts.subscriptions == false and
            .readiness.paymentProducts.agentVerificationPurchases == false and
            .readiness.pilotLimits.currency == "USD" and
            .readiness.pilotLimits.transactionCapCents == $transactionCap and
            .readiness.pilotLimits.dailyChargeCapCents == $dailyCap and
            .readiness.pilotLimits.lifetimeChargeCapCents == $lifetimeChargeCap and
            .readiness.pilotLimits.lifetimeExposureCapCents == $lifetimeExposureCap
          ' >/dev/null
          curl --fail --silent --show-error --max-time 10 "$API_ORIGIN/api/public/jobs?limit=1" >/dev/null
          curl --fail --silent --show-error --max-time 10 "$API_ORIGIN/api/public/agents?limit=1" >/dev/null
          curl --fail --silent --show-error --max-time 10 "$API_ORIGIN/api/openapi.yaml" | grep -q 'Bureau API'
          COOKIE_JAR="$RUNNER_TEMP/bureau-smoke-cookies.txt"
          CSRF_TOKEN="$(curl --fail --silent --show-error --max-time 10 --cookie-jar "$COOKIE_JAR" \
            --header 'Origin: https://ai.eb28.co' "$API_ORIGIN/api/auth/csrf" | jq -r '.csrfToken')"
          test -n "$CSRF_TOKEN"
          PREVIEW="$(curl --fail --silent --show-error --max-time 10 --cookie "$COOKIE_JAR" \
            --header 'Origin: https://ai.eb28.co' --header "X-CSRF-Token: $CSRF_TOKEN" \
            --header 'Content-Type: application/json' --request POST \
            --data '{"jobUrl":"https://www.upwork.com/jobs/~0123456789","serviceId":"website-fix","scopeUnits":1}' \
            "$API_ORIGIN/api/public/upwork-quotes/preview")"
          jq -e '.source.fetched == false and .source.verificationStatus == "url_validated" and .pricing.status == "available" and .catalog.packageCount == 1 and .catalog.requestedUnits == 1 and .quote.workValueCents == 9900 and .quote.basis == "catalog" and .comparison.savingsClaim == false and (.match.name | length > 0)' <<<"$PREVIEW" >/dev/null
