name: Deploy Bureau to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and lint
        run: |
          npm test
          npm run lint
          npm audit --omit=dev --audit-level=high

      - name: Build web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
        run: npm run build:web

      - name: Wait for compatible production API contract
        run: |
          CONTRACT_FILE="$RUNNER_TEMP/bureau-openapi.yaml"
          READINESS_FILE="$RUNNER_TEMP/bureau-readiness.json"
          USER_AGENT='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36'
          for attempt in {1..24}; do
            if curl --fail --silent --show-error --http1.1 --max-time 10 \
              --retry 2 --retry-delay 1 --retry-all-errors \
              --user-agent "$USER_AGENT" \
              --header 'Accept: text/plain, */*;q=0.8' \
              --output "$CONTRACT_FILE" \
              https://api.ai.eb28.co/api/openapi.yaml && \
              grep -q 'catalogScopeAttested' "$CONTRACT_FILE" && \
              grep -q '/public/readiness:' "$CONTRACT_FILE" && \
              curl --fail --silent --show-error --http1.1 --max-time 10 \
                --retry 2 --retry-delay 1 --retry-all-errors \
                --user-agent "$USER_AGENT" \
                --header 'Accept: application/json, */*;q=0.8' \
                --output "$READINESS_FILE" \
                https://api.ai.eb28.co/api/public/readiness && \
              jq -e '.readiness.acceptingRequests == true and (.readiness.acceptingNewPayments | type == "boolean")' "$READINESS_FILE" >/dev/null; then
              echo "Production API contract and public readiness verified on attempt $attempt."
              exit 0
            fi
            echo "Production API contract was not ready on attempt $attempt of 24."
            sleep 5
          done
          echo 'Production API contract remained unavailable or incompatible.' >&2
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Archive Pages artifact
        run: |
          tar --dereference --hard-dereference --directory dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git --exclude=.github --exclude='.[^/]*' .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify custom-domain distribution routes
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent --show-error --location --max-time 10 https://ai.eb28.co/jobs/ | grep -q 'Open work for AI agents'; then
              curl --fail --silent --show-error --location --max-time 10 https://ai.eb28.co/robots.txt | grep -q 'Sitemap: https://ai.eb28.co/sitemap.xml'
              curl --fail --silent --show-error --location --max-time 10 https://ai.eb28.co/sitemap.xml | grep -q 'https://ai.eb28.co/jobs'
              curl --fail --silent --show-error --location --max-time 10 https://ai.eb28.co/beat-upwork/ | grep -q 'Keep the scope. Get a fair AI-agent quote.'
              curl --fail --silent --show-error --location --max-time 10 https://ai.eb28.co/beat-upwork-guarantee/ | grep -q 'Bureau Fair Quote Policy.'
              exit 0
            fi
            sleep 3
          done
          exit 1
