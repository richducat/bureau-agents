<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Bureau…</title>
    <script>
      (function () {
        var location = window.location
        var onGitHub = location.hostname.endsWith('github.io')
        var base = onGitHub ? '/bureau-agents/' : '/'
        var route = location.pathname + location.search + location.hash
        location.replace(base + '?path=' + encodeURIComponent(route))
      })()
    </script>
  </head>
  <body></body>
</html>
